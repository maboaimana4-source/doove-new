<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="color-scheme" content="light dark" />
	<script>
		(function () {
			try {
				var stored = localStorage.getItem("mode-watcher-mode");
				var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
				var resolved = stored && stored !== "system" ? stored : (prefersDark ? "dark" : "light");
				var root = document.documentElement;
				if (resolved === "dark") {
					root.classList.add("dark");
					root.setAttribute("data-theme", "dark");
				} else {
					root.setAttribute("data-theme", "light");
				}
			} catch (_) {}
		})();
	</script>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div id="boot" aria-hidden="true">
		<div class="boot-plate">
			<div class="logo-pop">
				<img src="/logo.svg" alt="" class="boot-logo" width="64" height="64" />
			</div>
			<div class="boot-wordmark">Doove</div>
			<div class="boot-tag">Open Source Screen Recorder</div>

			<!-- Rotating, app-themed status messages -->
			<div class="boot-status">
				<span>Warming up the lens</span>
				<span>Tuning the recorder</span>
				<span>Polishing pixels</span>
				<span>Setting the stage</span>
				<span>Almost ready</span>
			</div>

			<!-- Small indeterminate shimmer loader (primary color) -->
			<div class="boot-loader" role="progressbar" aria-label="Loading Doove"></div>
		</div>

		<style>
			/* Mirrors @doove/design tokens. Inlined because this paints before
			   app.css loads. Keep in sync with packages/design/src/index.css. */
			#boot {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: hsl(193.22deg 11.17% 90.43%);
				color: hsl(0, 0%, 10%);
				font-family: "Geist Variable", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
				transition: opacity 280ms ease-out;
				will-change: opacity;
				/* Primary color — mirrors --primary in packages/design/src/index.css */
				--boot-accent: hsl(175.18deg 84.05% 31.96%);
				--boot-track: hsl(175.18deg 84.05% 31.96% / 0.16);
			}

			html.dark #boot,
			html[data-theme="dark"] #boot {
				background: hsl(199.87deg 1.54% 8.84%);
				color: hsl(0 0% 94%);
				--boot-accent: hsl(75 100% 50%);
				--boot-track: hsl(75 100% 50% / 0.16);
			}

			#boot.boot-leaving {
				opacity: 0;
				pointer-events: none;
			}

			/* Plate: surface lift via --shadow-craft-inset language */
			#boot .boot-plate {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 18px;
				width: 360px;
				padding: 36px 32px;
				border-radius: 16px;
				/* background: hsl(0, 0%, 100%); */
				animation: boot-plate-in 380ms cubic-bezier(0.16, 1, 0.3, 1) both;
			}

	

			#boot .logo-pop {
				display: grid;
				place-items: center;
				animation: boot-pop 400ms cubic-bezier(0.2, 0.7, 0.3, 1) both;
				will-change: transform, opacity;
			}

			#boot .boot-logo {
				width: 64px;
				height: 64px;
				display: block;
			}

			#boot .boot-wordmark {
				font-size: 20px;
				font-weight: 600;
				letter-spacing: -0.01em;
				line-height: 1;
			}

			#boot .boot-tag {
				font-family: "Geist Mono Variable", "Space Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
				font-size: 12px;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: hsl(220 8.9% 46.1%);
				line-height: 1;
			}

			html.dark #boot .boot-tag,
			html[data-theme="dark"] #boot .boot-tag {
				color: hsl(0 0% 55%);
			}

			/* Rotating status messages — one shows at a time, CSS-cycled */
			#boot .boot-status {
				position: relative;
				width: 100%;
				height: 15px;
				margin-top: 2px;
			}

			#boot .boot-status span {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 12.5px;
				letter-spacing: -0.005em;
				color: hsl(220 8.9% 46.1%);
				opacity: 0;
				animation: boot-status-cycle 10s infinite;
				will-change: opacity, transform;
			}

			html.dark #boot .boot-status span,
			html[data-theme="dark"] #boot .boot-status span {
				color: hsl(0 0% 60%);
			}

			#boot .boot-status span:nth-child(1) { animation-delay: 0s; }
			#boot .boot-status span:nth-child(2) { animation-delay: 2s; }
			#boot .boot-status span:nth-child(3) { animation-delay: 4s; }
			#boot .boot-status span:nth-child(4) { animation-delay: 6s; }
			#boot .boot-status span:nth-child(5) { animation-delay: 8s; }

			/* Small indeterminate shimmer loader (uses --primary) */
			#boot .boot-loader {
				position: relative;
				width: 132px;
				height: 3px;
				border-radius: 999px;
				background: var(--boot-track);
				overflow: hidden;
			}

			#boot .boot-loader::after {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 40%;
				border-radius: inherit;
				background: linear-gradient(
					90deg,
					transparent,
					var(--boot-accent),
					transparent
				);
				box-shadow: 0 0 6px var(--boot-accent);
				animation: boot-shimmer 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
				will-change: transform;
			}

			@keyframes boot-shimmer {
				from { transform: translateX(-120%); }
				to   { transform: translateX(350%); }
			}

			@keyframes boot-status-cycle {
				0%   { opacity: 0; transform: translateY(4px); }
				3%   { opacity: 1; transform: translateY(0); }
				17%  { opacity: 1; transform: translateY(0); }
				20%  { opacity: 0; transform: translateY(-4px); }
				100% { opacity: 0; transform: translateY(-4px); }
			}

			@keyframes boot-pop {
				from { transform: scale(0.88); opacity: 0; }
				to   { transform: scale(1);    opacity: 1; }
			}

			@keyframes boot-plate-in {
				from { transform: translateY(4px); opacity: 0; }
				to   { transform: translateY(0);   opacity: 1; }
			}

			@media (prefers-reduced-motion: reduce) {
				#boot .logo-pop,
				#boot .boot-plate,
				#boot .boot-loader::after {
					animation: none;
				}
				/* Show only the first message, statically. */
				#boot .boot-status span {
					animation: none;
				}
				#boot .boot-status span:nth-child(1) {
					opacity: 1;
					transform: none;
				}
				/* Static partial fill instead of a sweep. */
				#boot .boot-loader::after {
					width: 100%;
					background: var(--boot-accent);
					box-shadow: none;
					opacity: 0.85;
				}
			}
		</style>
	</div>

	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
