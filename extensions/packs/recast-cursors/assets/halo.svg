  </g>
  <circle cx="32" cy="32" r="2.6" fill="#38bdf8"/>
  <circle cx="32" cy="32" r="2.6" fill="none" stroke="#0a0a0a" stroke-opacity="0.4" stroke-width="0.8"/>
</svg>
