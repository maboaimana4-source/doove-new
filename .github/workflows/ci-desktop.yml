name: CI Desktop App

# Per-push compile gate for the desktop app on all three target OSes.
# `release-desktop.yml` already builds + bundles Windows/macOS/Linux, but it
# only fires on `v*` tags — far too late to catch a change that broke a
# platform you can't run locally. This workflow compiles (no bundling, no
# signing, no FFmpeg execution) on every push/PR so cross-platform code stays
# green while it's being written.
#
# Why this is the right tool: the Linux capture stack (`pipewire`, `ashpd`,
# `x11rb`) links against system C libraries and cannot build on a Windows
# dev host; WSL can compile it but has no `xdg-desktop-portal`, so it can't
# functionally test capture either. CI is the only place both platforms
# compile continuously. Functional capture testing still needs real Linux /
# macOS hardware — that is deliberately out of scope here.

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*" # tag pushes are handled by release-desktop.yml
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - ".github/workflows/ci-desktop.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - ".github/workflows/ci-desktop.yml"

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.23.0"
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FFMPEG_VERSION: "7.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all --check

  compile:
    name: Compile (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - name: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          key: ci-${{ matrix.platform.rust_target }}
          shared-key: ci-tauri-${{ matrix.platform.name }}
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-24.04'
        # Shared with release-desktop.yml. See the script for the
        # PipeWire/libspa header version trap that the PPA resolves.
        run: bash scripts/release/install-linux-deps.sh

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # `tauri::generate_context!` validates that every `externalBin` sidecar
      # exists for the target triple at macro-expansion time, so even a
      # no-bundle compile needs the files present. We never execute them in
      # CI, so empty placeholder files are enough — this skips the ~50 MB
      # FFmpeg download the release workflow does.
      - name: Create placeholder FFmpeg sidecars
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            : > "$dest/ffmpeg-$triple.exe"
            : > "$dest/ffprobe-$triple.exe"
          else
            : > "$dest/ffmpeg-$triple"
            : > "$dest/ffprobe-$triple"
            chmod +x "$dest/ffmpeg-$triple" "$dest/ffprobe-$triple"
          fi

      # Google Drive OAuth credentials (optional). Only injected when the
      # secret is present on the runner — fork PRs don't get it. Without
      # the secret, `option_env!("GOOGLE_OAUTH_CLIENT_ID")` resolves to
      # None and gdrive_connect returns "OAuth not configured" at runtime;
      # the build itself still compiles cleanly. We pass via the build
      # step's env (not a written .env file) so missing-secret runs
      # produce empty strings rather than literal "${{ ... }}" text.
      # `tauri build --no-bundle` runs the frontend build (beforeBuildCommand)
      # and a full release compile of the Rust crate, then stops before
      # producing installers — no MSIX/DMG/AppImage, no code signing, no
      # updater artifacts. That is exactly the cross-platform compile gate we
      # want: it proves the code builds on each OS without the slow, secret-
      # dependent packaging steps.
      - name: Compile desktop app (no bundle)
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: pnpm --filter doove-desktop tauri build --no-bundle ${{ matrix.platform.tauri_args }}

      # Clippy after the build so the compile gate above is the hard failure
      # signal; lint findings surface here without blocking until the team
      # decides to make them blocking (drop `continue-on-error` then).
      - name: Clippy
        continue-on-error: true
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --target ${{ matrix.platform.rust_target }}
